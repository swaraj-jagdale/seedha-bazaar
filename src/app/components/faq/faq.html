<section class="faq-section" id="faqs">
  <div class="faq-container">
    <h2 class="section-title">{{ lang.t('faq.title') }}</h2>

    <div class="faq-list">
      @for (faq of faqKeys; track faq.q; let i = $index) {
        <div class="faq-item" [class.open]="openIndex() === i">
          <button class="faq-question" (click)="toggleFaq(i)">
            <span>{{ lang.t(faq.q) }}</span>
            <span class="faq-icon">+</span>
          </button>
          @if (openIndex() === i) {
            <div class="faq-answer">
              <p>{{ lang.t(faq.a) }}</p>
            </div>
          }
        </div>
      }
    </div>

    <a href="#faqs" class="view-all-btn">{{ lang.t('faq.viewAll') }}</a>
  </div>
</section>

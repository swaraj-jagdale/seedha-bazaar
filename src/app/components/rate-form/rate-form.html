<div class="rate-form-wrapper">
  <div class="rate-form-card">
    <h3>{{ editRate ? lang.t('rateForm.editTitle') : lang.t('rateForm.addTitle') }}</h3>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>{{ lang.t('rateForm.crop') }}</label>
          <select [(ngModel)]="selectedCrop" name="crop" (ngModelChange)="onCropChange()" required>
            <option value="" disabled>{{ lang.t('rateForm.selectCrop') }}</option>
            @for (crop of crops; track crop.name) {
              <option [value]="crop.name">{{ crop.name }}</option>
            }
            <option value="__custom__">+ {{ lang.t('rateForm.customCrop') }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>{{ lang.t('rateForm.mandi') }}</label>
          <select [(ngModel)]="selectedMandi" name="mandi" required>
            @for (mandi of mandis; track mandi) {
              <option [value]="mandi">{{ mandi }}</option>
            }
          </select>
        </div>
      </div>

      @if (isCustomCrop) {
        <div class="form-row custom-crop-row">
          <div class="form-group">
            <label>{{ lang.t('rateForm.cropName') }} *</label>
            <input type="text" [(ngModel)]="customCropName" name="customCropName" placeholder="e.g. Grapes, Banana" required />
          </div>
          <div class="form-group">
            <label>{{ lang.t('rateForm.cropEmoji') }}</label>
            <input type="text" [(ngModel)]="customCropEmoji" name="customCropEmoji" placeholder="e.g. 🍇" />
          </div>
        </div>
      }

      <div class="grade-section">
        <h4>{{ lang.t('rateForm.gradeA') }}</h4>
        <div class="price-row">
          <div class="form-group">
            <label>{{ lang.t('rateForm.minPrice') }} (₹)</label>
            <input type="number" [(ngModel)]="gradeAMin" name="gradeAMin" placeholder="e.g. 2300" required />
          </div>
          <div class="form-group">
            <label>{{ lang.t('rateForm.maxPrice') }} (₹)</label>
            <input type="number" [(ngModel)]="gradeAMax" name="gradeAMax" placeholder="e.g. 2500" required />
          </div>
        </div>
      </div>

      <div class="grade-section">
        <h4>{{ lang.t('rateForm.gradeB') }}</h4>
        <div class="price-row">
          <div class="form-group">
            <label>{{ lang.t('rateForm.minPrice') }} (₹)</label>
            <input type="number" [(ngModel)]="gradeBMin" name="gradeBMin" placeholder="e.g. 2000" required />
          </div>
          <div class="form-group">
            <label>{{ lang.t('rateForm.maxPrice') }} (₹)</label>
            <input type="number" [(ngModel)]="gradeBMax" name="gradeBMax" placeholder="e.g. 2300" required />
          </div>
        </div>
      </div>

      <div class="grade-section">
        <h4>{{ lang.t('rateForm.gradeC') }}</h4>
        <div class="price-row">
          <div class="form-group">
            <label>{{ lang.t('rateForm.minPrice') }} (₹)</label>
            <input type="number" [(ngModel)]="gradeCMin" name="gradeCMin" placeholder="e.g. 1700" required />
          </div>
          <div class="form-group">
            <label>{{ lang.t('rateForm.maxPrice') }} (₹)</label>
            <input type="number" [(ngModel)]="gradeCMax" name="gradeCMax" placeholder="e.g. 1900" required />
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="cancel-btn" (click)="cancel()">{{ lang.t('rateForm.cancel') }}</button>
        <button type="submit" class="save-btn" [disabled]="loading">
          {{ loading ? lang.t('rateForm.saving') : (editRate ? lang.t('rateForm.update') : lang.t('rateForm.save')) }}
        </button>
      </div>
    </form>
  </div>
</div>

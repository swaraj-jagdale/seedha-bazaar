<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/images/logo.svg" alt="Seedha Bazaar Logo" width="40" height="40">
      <h2>Admin Login</h2>
      <p class="login-subtitle">Seedha Bazaar Administration</p>
    </div>

    @if (error()) {
      <div class="error-msg">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email *</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="admin@seedhabazaar.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password *</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Enter password" required />
      </div>
      <button type="submit" class="submit-btn" [disabled]="loading()">
        {{ loading() ? 'Please wait...' : 'Login' }}
      </button>
    </form>
  </div>
</div>
